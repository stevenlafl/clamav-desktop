name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  draft:
    name: Draft
    if: ${{ startsWith(github.ref, 'refs/tags/v') }}
    runs-on: ubuntu-latest
    steps:
      - name: Get Version
        id: get_version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
      - name: Draft
        uses: release-drafter/release-drafter@v7
        with:
          version: ${{ steps.get_version.outputs.version }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  release_deb:
    name: Release DEB (${{ matrix.target }})
    needs: draft
    strategy:
      fail-fast: false
      matrix:
        target: ['x86_64-unknown-linux-gnu']
    runs-on: ubuntu-latest
    container:
      image: ivangabriele/tauri:debian-bookworm-22
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Install core build requirements
        run: make setup-debian
      - name: Setup Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          components: 'cargo,clippy,rust-docs,rust-src,rustc,rustfmt'
          rustflags: ''
          target: ${{ matrix.target }}
          toolchain: '1.93'
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          cache: yarn
          node-version: 24
      - name: Prepare
        run: yarn --frozen-lockfile
      - name: Bundle
        run: yarn bundle:deb --target ${{ matrix.target }}
        env:
          TARGET: ${{ matrix.target }}
      - name: Upload Release Assets
        uses: softprops/action-gh-release@v2
        with:
          files: src-tauri/target/${{ matrix.target }}/release/bundle/deb/*.deb
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  release_dmg:
    name: Release DMG (${{ matrix.target }})
    needs: draft
    strategy:
      fail-fast: false
      matrix:
        target: ['x86_64-apple-darwin']
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Install core build requirements
        run: make setup-macos
      - name: Setup Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          components: 'cargo,clippy,rust-docs,rust-src,rustc,rustfmt'
          target: ${{ matrix.target }}
          rustflags: ''
          toolchain: '1.93'
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          cache: yarn
          node-version: 24
      - name: Prepare
        run: yarn --frozen-lockfile
      - name: Bundle
        run: yarn bundle:dmg --target ${{ matrix.target }}
        env:
          TARGET: ${{ matrix.target }}
      - name: Upload Release Assets
        uses: softprops/action-gh-release@v2
        with:
          files: src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  release_msi:
    name: Release MSI (${{ matrix.target }})
    needs: draft
    strategy:
      fail-fast: false
      matrix:
        target: ['x86_64-pc-windows-msvc']
    runs-on: windows-2025
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          components: 'cargo,clippy,rust-docs,rust-src,rustc,rustfmt'
          rustflags: ''
          target: ${{ matrix.target }}
          toolchain: '1.93'
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          cache: yarn
          node-version: 24
      - name: Prepare
        run: yarn --frozen-lockfile
      - name: Bundle
        run: yarn bundle:msi --target ${{ matrix.target }}
        env:
          TARGET: ${{ matrix.target }}
      - name: Upload Release Assets
        uses: softprops/action-gh-release@v2
        with:
          files: src-tauri/target/${{ matrix.target }}/release/bundle/msi/*.msi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish:
    name: Publish
    needs:
      - release_deb
      - release_dmg
      - release_msi
    runs-on: ubuntu-latest
    steps:
      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
